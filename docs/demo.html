function GwsLogo({size=24}){
  const s=size/12, r=size/16;
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <rect x="2"  y="2"  width="9" height="9" rx={r} fill={G.blue}/>

    </svg>
  );
}

/* ── Sparkline chart ── */
function Spark({data,labels,color=G.blue,th,w=170,h=44}){
  const mx=Math.max(...data),mn=Math.min(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w,h-((v-mn)/r)*(h-8)-4]);
  const d=pts.map((p,i)=>`${i?"L":"M"}${p[0]} ${p[1]}`).join(" ");
  return(
    <svg viewBox={`0 0 ${w} ${h+14}`} style={{width:"100%",height:h+14}}>
      <defs><linearGradient id={`g${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".18"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={`${d} L${w} ${h} L0 ${h}Z`} fill={`url(#g${color.slice(1)})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-2?3:0} fill={color}/>)}
      {labels&&labels.map((l,i)=><text key={i} x={pts[i]?.[0]} y={h+12} textAnchor="middle" fill={th.chartLabel} fontSize="8">{l}</text>)}
    </svg>
  );
}

/* ── Chat area ── */
function ChatArea({messages,onSend,typing,th}){
  const[input,setInput]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages,typing]);
  const go=()=>{if(input.trim()&&!typing){onSend(input.trim());setInput("");}};
  const fmt=s=>s.split("\n").map((ln,i)=>{
    let h=ln.replace(/\*\*(.+?)\*\*/g,`<b style="color:${th.text};font-weight:600">$1</b>`);
    h=h.replace(/^• /,`<span style="color:${G.blue};margin-right:4px">•</span>`);
    h=h.replace(/^(\d+)\. /,`<span style="color:${G.blue};margin-right:4px">$1.</span>`);
    return <p key={i} style={{minHeight:ln?"auto":5}} dangerouslySetInnerHTML={{__html:h||"&nbsp;"}}/>;
  });
  const empty=messages.length===0&&!typing;
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden",background:th.root}}>
      <div style={{flex:1,overflowY:"auto"}}>
        {empty?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:20}}>
            <div style={{position:"relative",marginBottom:18}}>
              <div style={{width:60,height:60,borderRadius:16,background:th.card,border:`2px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 24px rgba(66,133,244,.15)`}}>
                <GwsLogo size={34}/>
              </div>
              <div style={{position:"absolute",bottom:-2,right:-2,width:14,height:14,borderRadius:"50%",background:G.green,border:`2.5px solid ${th.root}`,boxShadow:`0 0 6px ${G.green}88`}}/>
            </div>
            <div style={{fontSize:18,fontWeight:700,color:th.text,marginBottom:4}}>gws-dashboard</div>
            <div style={{fontSize:11,color:th.textDim,marginBottom:2}}>Your AI-powered Google Workspace cockpit.</div>
            <div style={{fontSize:10,color:th.textFaint,marginBottom:28}}>All data is sourced directly — never fabricated.</div>
            {/* Google 4-color accent bar */}
            <div style={{display:"flex",gap:0,borderRadius:4,overflow:"hidden",marginBottom:28,height:3,width:120}}>
              {[G.blue,G.red,G.yellow,G.green].map(c=><div key={c} style={{flex:1,background:c}}/>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:380}}>
              {PROMPTS.map((c,i)=>(
                <button key={i} onClick={()=>onSend(c.text)}
                  style={{display:"flex",alignItems:"flex-start",gap:8,padding:10,borderRadius:10,border:`1px solid ${th.border}`,background:th.card,cursor:"pointer",textAlign:"left",transition:"all .15s"}}
                  onMouseOver={e=>{e.currentTarget.style.borderColor=G.blue+"60";e.currentTarget.style.boxShadow=`0 2px 10px rgba(66,133,244,.1)`;}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor=th.border;e.currentTarget.style.boxShadow="none";}}>
                  <span style={{fontSize:14,marginTop:2,flexShrink:0}}>{c.icon}</span>
                  <span style={{fontSize:10,color:th.textDim,lineHeight:1.5}}>{c.text}</span>
                </button>
              ))}
            </div>
          </div>
        ):(
          <div style={{maxWidth:520,margin:"0 auto",padding:"16px 16px 8px",display:"flex",flexDirection:"column",gap:12}} className="fade-in">
            {messages.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:8,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&(
                  <div style={{width:26,height:26,borderRadius:7,flexShrink:0,marginTop:3,background:th.card,border:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <GwsLogo size={14}/>
                  </div>
                )}
                <div style={{maxWidth:"88%"}}>
                  <div style={{borderRadius:14,padding:"8px 12px",fontSize:11,lineHeight:1.7,
                    ...(m.role==="user"
                      ?{background:G.blueDk,color:"#fff"}
                      :{background:th.msgAI,border:`1px solid ${th.msgAIBorder}`,color:th.msgAIText})}}>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>{m.role==="assistant"?fmt(m.content):m.content}</div>
                  </div>
                  <div style={{fontSize:8,color:th.textVF,marginTop:2,paddingLeft:2}}>{m.time}</div>
                </div>
              </div>
            ))}
            {typing&&(
              <div style={{display:"flex",gap:8}}>
                <div style={{width:26,height:26,borderRadius:7,flexShrink:0,background:th.card,border:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <GwsLogo size={14}/>
                </div>
                <div style={{background:th.msgAI,border:`1px solid ${th.msgAIBorder}`,borderRadius:14,padding:"10px 14px",display:"flex",gap:4,alignItems:"center"}}>
                  {[G.blue,G.red,G.green].map((c,d)=>(
                    <div key={d} className="ani-bounce" style={{width:6,height:6,borderRadius:"50%",background:c,opacity:.7,animationDelay:`${d*150}ms`}}/>
                  ))}
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>
        )}
      </div>
      {/* Input */}
      <div style={{padding:"4px 16px 12px"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex",alignItems:"center",gap:8,background:th.inputBg,border:`1px solid ${th.border}`,borderRadius:14,padding:"6px 8px 6px 12px",transition:"border-color .15s"}}
          onFocusCapture={e=>e.currentTarget.style.borderColor=G.blue+"80"}
          onBlurCapture={e=>e.currentTarget.style.borderColor=th.border}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}
            placeholder="Ask about Gmail, Calendar, Drive, Tasks..."
            style={{flex:1,background:"transparent",fontSize:11,color:th.inputText,border:"none",outline:"none"}}/>
          <button onClick={go} disabled={!input.trim()||typing}
            style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"none",cursor:input.trim()&&!typing?"pointer":"default",transition:"all .15s",
              background:input.trim()&&!typing?G.blue:th.border,
              color:input.trim()&&!typing?"#fff":th.textFaint}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div style={{fontSize:8,color:th.textVF,textAlign:"center",marginTop:4}}>
          gws-dashboard · Data sourced directly from Google Workspace · Zero telemetry
        </div>
      </div>
    </div>
  );
}

/* ── Right panel ── */
function RightSide({tasksDone,total,th}){
  const[tab,setTab]=useState("analytics");
  const pending=total-tasksDone;
  const pDot={critical:G.red,action:G.yellow,reply:G.blue,fyi:G.green};
  const tabs=[{id:"analytics",i:"📊",l:"Analytics",c:G.yellow},{id:"drive",i:"📁",l:"Drive",c:G.blue},{id:"inbox",i:"📬",l:"Inbox",c:G.red}];
  return(
    <div style={{width:215,flexShrink:0,background:th.sidebar,borderLeft:`1px solid ${th.borderSide}`,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:2,padding:"10px 8px 8px"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:5,fontSize:9,fontWeight:600,border:"none",cursor:"pointer",transition:"all .15s",
              background:tab===t.id?`${t.c}18`:th.tabInactive,
              color:tab===t.id?t.c:th.tabInactiveTxt}}>
            <span style={{fontSize:9}}>{t.i}</span><span>{t.l}</span>
          </button>
        ))}
      </div>

      {tab==="analytics"&&(
        <div style={{padding:"0 8px 12px",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{background:th.card,borderRadius:8,border:`1px solid ${th.border}`,padding:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:600,color:th.text}}>Email Volume (This Week)</span>
              <span style={{fontSize:8,color:th.textFaint}}>Approx.</span>
            </div>
            <Spark data={emailVol} labels={DOW} color={G.red} th={th}/>
          </div>
          <div style={{background:th.card,borderRadius:8,border:`1px solid ${th.border}`,padding:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:600,color:th.text}}>Meeting Load (hrs/week)</span>
              <span style={{fontSize:8,color:th.textFaint}}>4 weeks</span>
            </div>
            <Spark data={meetHrs} labels={WKS} color={G.blue} th={th}/>
          </div>
          <div style={{background:th.card,borderRadius:8,border:`1px solid ${th.border}`,padding:10}}>
            <div style={{fontSize:10,fontWeight:600,color:th.text,marginBottom:8}}>Live Stats</div>
            {[{l:"Unread emails",v:"1,835",c:G.red},{l:"Meetings today",v:"10",c:G.blue},{l:"Pending tasks",v:String(pending),c:G.green}].map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}}>
                <span style={{fontSize:9,color:th.textDim}}>{s.l}</span>
                <span style={{fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums",color:s.c}}>{s.v}</span>
              </div>
            ))}
          </div>
          {/* Google color bar */}
          <div style={{display:"flex",gap:0,borderRadius:4,overflow:"hidden",height:3}}>
            {[G.blue,G.red,G.yellow,G.green].map(c=><div key={c} style={{flex:1,background:c}}/>)}
          </div>
          <button style={{width:"100%",textAlign:"center",fontSize:10,fontWeight:600,color:G.blue,padding:"4px 0",background:"transparent",border:"none",cursor:"pointer",transition:"color .15s"}}
            onMouseOver={e=>e.currentTarget.style.color=G.blueDk}
            onMouseOut={e=>e.currentTarget.style.color=G.blue}>
            Get full briefing →
          </button>
        </div>
      )}

      {tab==="drive"&&(
        <div style={{padding:"0 8px 12px"}}>
          <div style={{fontSize:9,color:th.textFaint,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em"}}>Recent Files</div>
          {DRIVE_FILES.map((f,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:6,borderRadius:6,cursor:"pointer",transition:"all .15s"}}
              onMouseOver={e=>e.currentTarget.style.background=th.hover}
              onMouseOut={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:13}}>{f.icon}</span>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:9,color:th.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                <div style={{fontSize:8,color:th.textFaint}}>{f.time} · {f.views} viewers</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="inbox"&&(
        <div style={{padding:"0 8px 12px"}}>
          <div style={{fontSize:9,color:th.textFaint,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em"}}>Priority Inbox</div>
          {INBOX.map((e,i)=>(
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,padding:6,borderRadius:6,cursor:"pointer",transition:"all .15s"}}
              onMouseOver={ev=>ev.currentTarget.style.background=th.hover}
              onMouseOut={ev=>ev.currentTarget.style.background="transparent"}>
              <div style={{width:7,height:7,borderRadius:"50%",marginTop:4,flexShrink:0,background:pDot[e.p],boxShadow:`0 0 4px ${pDot[e.p]}80`}}/>
              <div style={{minWidth:0}}>
                <div style={{fontSize:9,color:th.textDim,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.subject}</div>
                <div style={{fontSize:8,color:th.textFaint,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.from} · {e.time}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── App root ── */
function App(){
  const[page,setPage]=useState("chat");
  const[tasks,setTasks]=useState(INIT_TASKS);
  const[msgs,setMsgs]=useState([]);
  const[typing,setTyping]=useState(false);
  const[dark,setDark]=useState(true);

  const th=dark?DARK:LIGHT;

  // sync body background
  useEffect(()=>{
    document.body.style.background=th.root;
    document.body.style.transition="background .2s";
  },[dark]);

  const toggle=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const send=useCallback(text=>{
    const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    setMsgs(p=>[...p,{role:"user",content:text,time:now}]);
    setTyping(true);
    setTimeout(()=>{
      const l=text.toLowerCase();
      let r=AI.fallback;
      if(l.includes("morning")||l.includes("briefing"))r=AI.briefing;
      else if(l.includes("meeting")||l.includes("prep")||l.includes("next"))r=AI.meeting;
      else if(l.includes("unread")||l.includes("email")||l.includes("summarize"))r=AI.emails;
      else if(l.includes("drive")||l.includes("doc")||l.includes("search"))r=AI.drive;
      else if(l.includes("task")||l.includes("pending")||l.includes("completed"))r=AI.tasks;
      else if(l.includes("reply")||l.includes("latest")||l.includes("team"))r=AI.reply;
      setTyping(false);
      const t2=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      setMsgs(p=>[...p,{role:"assistant",content:r,time:t2}]);
    },1200+Math.random()*800);
  },[]);

  const done=tasks.filter(t=>t.done).length;
  return(
    <div style={{height:"100vh",display:"flex",background:th.root,color:th.text,overflow:"hidden",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      <IconBar page={page} setPage={setPage} dark={dark} onToggle={()=>setDark(d=>!d)} th={th}/>
      <LeftSide tasks={tasks} toggle={toggle} th={th}/>
      <ChatArea messages={msgs} onSend={send} typing={typing} th={th}/>
      <RightSide tasksDone={done} total={tasks.length} th={th}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
