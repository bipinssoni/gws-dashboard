function Spark({data,labels,color="#3B82F6",w=170,h=44}){
  const mx=Math.max(...data),mn=Math.min(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w,h-((v-mn)/r)*(h-8)-4]);
  const d=pts.map((p,i)=>`${i?"L":"M"}${p[0]} ${p[1]}`).join(" ");
  return(
    <svg viewBox={`0 0 ${w} ${h+14}`} style={{width:"100%",height:h+14}}>
      <defs><linearGradient id={`g${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={`${d} L${w} ${h} L0 ${h}Z`} fill={`url(#g${color.slice(1)})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-2?3:0} fill={color}/>)}
      {labels&&labels.map((l,i)=><text key={i} x={pts[i]?.[0]} y={h+12} textAnchor="middle" fill="#4B6584" fontSize="8">{l}</text>)}
    </svg>
  );
}

function ChatArea({messages,onSend,typing}){
  const[input,setInput]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages,typing]);
  const go=()=>{if(input.trim()&&!typing){onSend(input.trim());setInput("");}};

  const fmt=s=>s.split("\n").map((ln,i)=>{
    let h=ln.replace(/\*\*(.+?)\*\*/g,'<b style="color:rgba(255,255,255,.95)">$1</b>');
    h=h.replace(/\*(.+?)\*/g,'<i style="color:rgba(160,190,220,.8)">$1</i>');
    h=h.replace(/^• /,'<span style="color:#60A5FA;margin-right:4px">•</span>');
    h=h.replace(/^(\d+)\. /,'<span style="color:#60A5FA;margin-right:4px">$1.</span>');
    return <p key={i} style={{minHeight:ln?"auto":6}} dangerouslySetInnerHTML={{__html:h||"&nbsp;"}}/>;
  });

  const Logo=()=>(
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  );
  const SmallLogo=()=>(
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  );

  const empty=messages.length===0&&!typing;
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}} className="bg-[#0B1120]">
      <div style={{flex:1,overflowY:"auto"}}>
        {empty?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"16px"}}>
            <div style={{position:"relative",marginBottom:16}}>
              <div style={{width:56,height:56,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center"}} className="bg-gradient-to-br from-blue-500 to-indigo-600 shadow-xl shadow-blue-500/20">
                <Logo/>
              </div>
              <div style={{position:"absolute",bottom:-2,right:-2,width:14,height:14,borderRadius:"50%",border:"2.5px solid #0B1120"}} className="bg-emerald-500"/>
            </div>
            <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:2}}>WorkspaceOS</div>
            <div style={{fontSize:11,color:"#6B8AAE",marginBottom:2}}>Your AI-powered Google Workspace cockpit.</div>
            <div style={{fontSize:10,color:"#3A5575",marginBottom:28}}>All data is sourced directly — never fabricated.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:380}}>
              {PROMPTS.map((c,i)=>(
                <button key={i} onClick={()=>onSend(c.text)}
                  style={{display:"flex",alignItems:"flex-start",gap:8,padding:10,borderRadius:10,border:"1px solid #18293F",background:"#101B2D",cursor:"pointer",textAlign:"left",transition:"all .15s"}}

                  <span style={{fontSize:10,color:"#6B8AAE",lineHeight:1.5}}>{c.text}</span>

  const[tab,setTab]=useState("analytics");
  const pending=total-tasksDone;
  return(
    <div style={{width:215,flexShrink:0}} className="bg-[#0C1322] border-l border-[#162240] flex flex-col overflow-y-auto">
      <div style={{display:"flex",alignItems:"center",gap:2,padding:"12px 8px 8px"}}>
        {[{id:"analytics",i:"📊",l:"Analytics"},{id:"drive",i:"📁",l:"Drive"},{id:"inbox",i:"📬",l:"Inbox"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:4,fontSize:9,fontWeight:600,border:"none",cursor:"pointer",transition:"all .15s",background:tab===t.id?"rgba(59,130,246,.1)":"transparent",color:tab===t.id?"#60A5FA":"#3A5575"}}>
            <span style={{fontSize:9}}>{t.i}</span><span>{t.l}</span>
          </button>
        ))}
      </div>

      {tab==="analytics"&&(
        <div style={{padding:"0 8px 12px",display:"flex",flexDirection:"column",gap:8}}>
          <div className="bg-[#101B2D] rounded-lg border border-[#18293F]" style={{padding:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.9)"}}>Email Volume (This Week)</span>
              <span style={{fontSize:8,color:"#3A5575"}}>Approx.</span>
            </div>
            <Spark data={emailVol} labels={DOW}/>
          </div>
          <div className="bg-[#101B2D] rounded-lg border border-[#18293F]" style={{padding:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.9)"}}>Meeting Load (hrs/week)</span>
              <span style={{fontSize:8,color:"#3A5575"}}>4 weeks</span>
            </div>
            <Spark data={meetHrs} labels={WKS}/>
          </div>
          <div className="bg-[#101B2D] rounded-lg border border-[#18293F]" style={{padding:10}}>
            <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.9)",marginBottom:8}}>Live Stats</div>
            {[{l:"Unread emails",v:"1,835",c:"#F59E0B"},{l:"Meetings today",v:"10",c:"#3B82F6"},{l:"Pending tasks",v:String(pending),c:"#22C55E"}].map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 0"}}>
                <span style={{fontSize:9,color:"#4B6584"}}>{s.l}</span>
                <span style={{fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums",color:s.c}}>{s.v}</span>
              </div>
            ))}
          </div>
          <button style={{width:"100%",textAlign:"center",fontSize:10,fontWeight:600,color:"#60A5FA",padding:"4px 0",background:"transparent",border:"none",cursor:"pointer"}}>Get full briefing →</button>
        </div>
      )}

      {tab==="drive"&&(
        <div style={{padding:"0 8px 12px"}}>
          <div style={{fontSize:9,color:"#3A5575",marginBottom:6}}>Recent Files</div>
          {DRIVE_FILES.map((f,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:6,borderRadius:6,cursor:"pointer",transition:"all .15s"}}
              onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}
              onMouseOut={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:12}}>{f.icon}</span>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:9,color:"#6B8AAE",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                <div style={{fontSize:8,color:"#2F4A6A"}}>{f.time} · {f.views} viewers</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="inbox"&&(
        <div style={{padding:"0 8px 12px"}}>
          <div style={{fontSize:9,color:"#3A5575",marginBottom:6}}>Priority Inbox</div>
          {INBOX.map((e,i)=>(
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,padding:6,borderRadius:6,cursor:"pointer",transition:"all .15s"}}
              onMouseOver={ev=>ev.currentTarget.style.background="rgba(255,255,255,.03)"}
              onMouseOut={ev=>ev.currentTarget.style.background="transparent"}>
              <div className={pDot[e.p]} style={{width:6,height:6,borderRadius:"50%",marginTop:5,flexShrink:0}}/>
              <div style={{minWidth:0}}>
                <div style={{fontSize:9,color:"#6B8AAE",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.subject}</div>
                <div style={{fontSize:8,color:"#2F4A6A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.from} · {e.time}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const[page,setPage]=useState("chat");
  const[tasks,setTasks]=useState(INIT_TASKS);
  const[msgs,setMsgs]=useState([]);
  const[typing,setTyping]=useState(false);
  const toggle=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const send=useCallback(text=>{
    const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    setMsgs(p=>[...p,{role:"user",content:text,time:now}]);
    setTyping(true);
    setTimeout(()=>{
      const l=text.toLowerCase();
      let r=AI.fallback;
      if(l.includes("morning")||l.includes("briefing"))r=AI.briefing;
      else if(l.includes("meeting")||l.includes("prep")||l.includes("next"))r=AI.meeting;
      else if(l.includes("unread")||l.includes("email")||l.includes("summarize"))r=AI.emails;
      else if(l.includes("drive")||l.includes("doc")||l.includes("search"))r=AI.drive;
      else if(l.includes("task")||l.includes("pending")||l.includes("completed"))r=AI.tasks;
      else if(l.includes("reply")||l.includes("latest")||l.includes("team"))r=AI.reply;
      setTyping(false);
      const t2=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      setMsgs(p=>[...p,{role:"assistant",content:r,time:t2}]);
    },1200+Math.random()*800);
  },[]);
  const done=tasks.filter(t=>t.done).length;
  return(
    <div style={{height:"100vh",display:"flex",background:"#0B1120",color:"#fff",overflow:"hidden",fontFamily:"system-ui,-apple-system,sans-serif"}}>
      <IconBar page={page} setPage={setPage}/>
      <LeftSide tasks={tasks} toggle={toggle}/>
      <ChatArea messages={msgs} onSend={send} typing={typing}/>
      <RightSide tasksDone={done} total={tasks.length}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
